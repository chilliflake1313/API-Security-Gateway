version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: api-gateway-redis-dev
    ports:
      - "6379:6379"
    networks:
      - api-gateway-dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: api-gateway-backend-dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: debug
      RATE_LIMIT: 100
      RATE_LIMIT_WINDOW: 60
    depends_on:
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - api-gateway-dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: api-gateway-frontend-dev
    ports:
      - "5173:5173"
    environment:
      REACT_APP_API_URL: http://localhost:3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - api-gateway-dev

networks:
  api-gateway-dev:
    driver: bridge
