version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: api-gateway-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-gateway-backend
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
      RATE_LIMIT: 100
      RATE_LIMIT_WINDOW: 60
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  redis-data:
